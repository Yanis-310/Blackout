<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackout - Connexion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'PP Editorial New';
            src: url('fonts/PPEditorialNew-Italic.otf') format('opentype');
            font-weight: 400;
            font-style: italic;
        }

        .page-logo-container {
            margin-bottom: 50px;
            margin-top: -30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-logo-wrapper {
            position: relative;
            display: flex;
            align-items: baseline;
        }

        .page-logo-shadow {
            position: absolute;
            top: 5px;
            left: 3px;
            display: flex;
            align-items: baseline;
            z-index: 1;
        }

        .page-logo-shadow .page-logo-black,
        .page-logo-shadow .page-logo-out {
            color: #693CFF;
        }

        .page-logo-front {
            position: relative;
            display: flex;
            align-items: baseline;
            z-index: 2;
        }

        .page-logo-front .page-logo-black,
        .page-logo-front .page-logo-out {
            color: #ffffff;
        }

        .page-logo-black {
            font-family: 'DM Sans', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-logo-out {
            font-family: 'PP Editorial New', serif;
            font-size: 6rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: -0.02em;
        }

        .page-logo-lines {
            width: 50px;
            height: auto;
            margin-left: 8px;
            position: relative;
            z-index: 2;
            align-self: flex-start;
            margin-top: -15px;
        }

        .intro-card-large {
            position: relative;
            background: #ffffff;
            border-radius: 30px;
            padding: 3rem 4rem 4rem;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }

        .qr-nature-morte {
            position: absolute;
            top: -45px;
            right: -20px;
            width: 180px;
            height: auto;
            z-index: 3;
            pointer-events: none;
            filter: drop-shadow(3px 3px 10px rgba(0, 0, 0, 0.3));
        }

        .qr-text {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #2d2d2d;
            line-height: 1.4;
            margin-bottom: 2rem;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            margin: 0 auto 1.5rem;
        }

        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .connection-status {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: #888;
            margin-top: 1rem;
        }

        .connection-status.connected {
            color: #4CAF50;
            font-weight: 600;
        }

        .waiting-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60%,
            100% {
                content: '...';
            }
        }

        .btn-force-disconnect {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #888;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 100;
        }

        .btn-force-disconnect:hover {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.4);
            color: #f44336;
        }
    </style>
</head>

<body>
    <section id="phase-intro" class="phase active">
        <!-- Logo Blackout -->
        <div class="page-logo-container">
            <div class="page-logo-wrapper">
                <div class="page-logo-shadow">
                    <span class="page-logo-black">black</span><span class="page-logo-out">out</span>
                </div>
                <div class="page-logo-front">
                    <span class="page-logo-black">black</span><span class="page-logo-out">out</span>
                </div>
            </div>
            <img src="assets/logo-lines.png" alt="" class="page-logo-lines">
        </div>

        <div class="intro-card-large">
            <img src="assets/nature-morte.png" alt="Nature morte" class="qr-nature-morte">
            <p class="qr-text">Pour jouer, connecte-toi avec ton smartphone en scannant le <span
                    style="color: #693CFF;">QR code</span> ci-dessous :</p>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://blackout-game.com"
                    alt="QR Code">
            </div>
            <p class="connection-status" id="connection-status">
                <span class="waiting-dots">Attente de la connexion d'un smartphone</span>
            </p>
        </div>
    </section>

    <button class="btn-force-disconnect" id="btn-force-disconnect" onclick="forceDisconnectAll()">🔌 Déconnecter les appareils</button>

    <script src="transitions.js"></script>
    <script>
        // Génération dynamique du QR Code
        const baseUrl = window.location.origin;
        const controllerUrl = `${baseUrl}/controller.html`;

        const qrImg = document.querySelector('.qr-code img');
        if (qrImg) {
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(controllerUrl)}`;
        }

        // Connexion WebSocket pour détecter la connexion du téléphone
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = protocol + '//' + window.location.host;
        let ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log('PC connecté au serveur WS');
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);

                // Le téléphone a appuyé sur "Suivant"
                if (data.type === 'PHONE_CONNECTED') {
                    document.getElementById('connection-status').innerHTML = '✓ Téléphone connecté !';
                    document.getElementById('connection-status').classList.add('connected');
                }

                // Le téléphone demande de passer à la page suivante
                if (data.type === 'NEXT_PAGE') {
                    navigateTo(data.target || 'intro.html');
                }

                // Confirmation de force disconnect
                if (data.type === 'FORCE_DISCONNECT_DONE') {
                    const btn = document.getElementById('btn-force-disconnect');
                    btn.textContent = `✓ ${data.count} appareil(s) déconnecté(s)`;
                    btn.style.color = '#4CAF50';
                    btn.style.borderColor = 'rgba(76, 175, 80, 0.4)';
                    document.getElementById('connection-status').innerHTML = '<span class="waiting-dots">Attente de la connexion d\'un smartphone</span>';
                    document.getElementById('connection-status').classList.remove('connected');
                    setTimeout(() => {
                        btn.textContent = '🔌 Déconnecter les appareils';
                        btn.style.color = '';
                        btn.style.borderColor = '';
                    }, 3000);
                }
            } catch (e) {
                console.error('Erreur message:', e);
            }
        };

        ws.onclose = () => {
            console.log('WS déconnecté, reconnexion...');
            setTimeout(() => {
                ws = new WebSocket(wsUrl);
            }, 3000);
        };

        function forceDisconnectAll() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'FORCE_DISCONNECT_ALL' }));
            }
        }
    </script>
</body>

</html>
